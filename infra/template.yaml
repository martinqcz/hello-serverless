AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hello Serverless Application

Parameters:
  DomainName:
    Type: String
    Default: hello.qapil.com
    Description: Custom domain name for CloudFront distribution

  CertificateArn:
    Type: String
    Description: ACM certificate ARN for hello.qapil.com (must be in us-east-1)

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

Globals:
  Function:
    Timeout: 15

Resources:
  # DynamoDB Table
  HelloTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hello
      BillingMode: PAY_PER_REQUEST
      ProvisionedThroughput:
        ReadCapacityUnits: 0
        WriteCapacityUnits: 0
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: hello-serverless

  # Lambda Function
  HelloBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hello-backend-${Environment}
      Description: Hello Serverless Backend (Micronaut + GraalVM)
      CodeUri: ../hello-backend/build/libs/hello-backend-0.1-lambda.zip
      Handler: not.used.in.provided.runtime
      Runtime: provided.al2023
      Architectures:
        - arm64
      Environment:
        Variables:
          DISABLE_SIGNAL_HANDLERS: true
          DYNAMODB_TABLE_NAME: !Ref HelloTable
          MICRONAUT_ENVIRONMENTS: !Ref Environment
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HelloTable
      MemorySize: 128
      Events:
        RootPath:
          Type: HttpApi
          Properties:
            ApiId: !Ref HelloHttpApi
            Path: /{proxy+}
            Method: ANY
            PayloadFormatVersion: "1.0"
      Tags:
        Environment: !Ref Environment

  # HTTP API
  HelloHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - !Sub https://${DomainName}
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"
        MaxAge: 600
      Tags:
        Environment: !Ref Environment

  # S3 Bucket for Frontend
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hello-frontend-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-OAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Bucket Policy for CloudFront OAC
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub Hello Serverless - ${Environment}
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100

        # Custom Domain
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only

        # Origins
        Origins:
          # Frontend (S3)
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig: {}

          # Backend (API Gateway)
          - Id: ApiOrigin
            DomainName: !Sub ${HelloHttpApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]

        # Default Behavior (Frontend)
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true

          # Managed Cache Policy: CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6

          # Managed Origin Request Policy: CORS-S3Origin
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf

        # API Behavior
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
            Compress: true

            # Managed Cache Policy: CachingDisabled
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad

            # Managed Origin Request Policy: AllViewerExceptHostHeader
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac

        # SPA Routing (404 → index.html)
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  CloudFrontDomain:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontDomain

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontDistributionId

  ApiGatewayUrl:
    Description: API Gateway HTTP API endpoint (direct access)
    Value: !Sub https://${HelloHttpApi}.execute-api.${AWS::Region}.amazonaws.com
    Export:
      Name: !Sub ${AWS::StackName}-ApiGatewayUrl

  FrontendBucketName:
    Description: S3 bucket name for frontend files
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${AWS::StackName}-FrontendBucket

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref HelloTable
    Export:
      Name: !Sub ${AWS::StackName}-DynamoDBTable

  ApplicationUrl:
    Description: Application URL (after DNS configuration)
    Value: !Sub https://${DomainName}
